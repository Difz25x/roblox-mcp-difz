<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roblox MCP Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:18px;color:#f0f6fc}
header span{color:#8b949e;font-size:13px}
.layout{display:flex;height:calc(100vh - 61px)}
.sidebar{width:300px;min-width:300px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:12px}
.sidebar h3{font-size:12px;text-transform:uppercase;color:#8b949e;margin-bottom:8px;padding:0 8px}
.tool-item{padding:6px 8px;cursor:pointer;border-radius:6px;font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.tool-item:hover{background:#1c2128}
.tool-item.active{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44}
.tool-item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tool-item .badge{font-size:10px;background:#30363d;padding:1px 6px;border-radius:10px;color:#8b949e;margin-left:6px}
.search-box{margin-bottom:10px;padding:0 8px}
.search-box input{width:100%;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:13px;outline:none}
.search-box input:focus{border-color:#1f6feb}
.main{flex:1;padding:24px;overflow-y:auto}
.tool-header{margin-bottom:20px}
.tool-header h2{font-size:20px;color:#f0f6fc;margin-bottom:4px}
.tool-header p{font-size:13px;color:#8b949e;line-height:1.5}
.section{margin-bottom:20px}
.section label{display:block;font-size:12px;font-weight:600;color:#8b949e;margin-bottom:6px;text-transform:uppercase}
.section textarea,.section input[type=text]{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:13px;font-family:'SF Mono','Fira Code',monospace;outline:none;resize:vertical}
.section textarea:focus,.section input:focus{border-color:#1f6feb}
.section textarea{min-height:80px}
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{padding:8px 20px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn-secondary:hover{background:#30363d}
.result-box{border-radius:8px;border:1px solid #30363d;overflow:hidden}
.result-box .result-header{padding:10px 14px;background:#161b22;border-bottom:1px solid #30363d;font-size:12px;font-weight:600;color:#8b949e;display:flex;justify-content:space-between;align-items:center}
.result-box .result-header .status{padding:2px 8px;border-radius:10px;font-size:11px}
.status.success{background:#23863633;color:#3fb950}
.status.error{background:#da363333;color:#f85149}
.status.pending{background:#d2992233;color:#d29922}
.result-box pre{padding:14px;overflow:auto;max-height:500px;font-size:12px;line-height:1.6;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;word-break:break-all;margin:0}
.param-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.param-row input{flex:1;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;outline:none;font-family:'SF Mono',monospace}
.param-row input:focus{border-color:#1f6feb}
.param-row .remove-param{background:0;border:none;color:#f85149;cursor:pointer;font-size:16px;padding:4px}
.add-param{background:0;border:1px dashed #30363d;color:#8b949e;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-top:4px}
.add-param:hover{border-color:#1f6feb;color:#58a6ff}
.raw-toggle{font-size:12px;color:#8b949e;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.raw-toggle:hover{color:#58a6ff}
.json-editor{display:none;margin-top:8px}
.json-editor.visible{display:block}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;min-width:0;height:200px;border-right:none;border-bottom:1px solid #30363d}}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8b949e;text-align:center;gap:12px}
.welcome h2{color:#f0f6fc;font-size:24px}
.welcome p{font-size:14px;max-width:400px;line-height:1.6}
.welcome .stats{display:flex;gap:24px;margin-top:16px}
.welcome .stat{padding:16px 24px;background:#161b22;border-radius:8px;border:1px solid #30363d}
.welcome .stat .num{font-size:28px;font-weight:700;color:#58a6ff}
.welcome .stat .lbl{font-size:12px;color:#8b949e;margin-top:4px}
.version{font-size:12px;color:#8b949e;background:#161b22;padding:2px 10px;border-radius:10px;border:1px solid #30363d}
</style>
</head>
<body>
<header>
  <h1>Roblox MCP</h1>
  <span class="version">v{{version}}</span>
  <span>localhost:{{port}}</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="search-box"><input id="search" type="text" placeholder="Search tools..." oninput="filterTools()"></div>
    <h3>Tools <span id="toolCount" style="color:#8b949e;font-weight:400"></span></h3>
    <div id="toolList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="welcome" id="welcome">
      <h2>MCP Playground</h2>
      <p>Select a tool from the sidebar to test it directly. Fill in parameters and execute.</p>
      <div class="stats">
        <div class="stat"><div class="num" id="statTools">0</div><div class="lbl">Tools</div></div>
        <div class="stat"><div class="num" id="statStatus">-</div><div class="lbl">Status</div></div>
        <div class="stat"><div class="num" id="statPort">{{port}}</div><div class="lbl">Port</div></div>
      </div>
    </div>
    <div id="toolPanel" style="display:none">
      <div class="tool-header">
        <h2 id="toolName"></h2>
        <p id="toolDesc"></p>
      </div>
      <div class="section" id="paramsSection">
        <label>Parameters</label>
        <div id="paramList"></div>
        <div class="raw-toggle" onclick="toggleRawEditor()"><span id="rawIcon">&#9654;</span> Raw JSON editor</div>
        <div class="json-editor" id="jsonEditor"><textarea id="jsonInput" rows="6" placeholder='{"key": "value"}'></textarea></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="executeTool()" id="execBtn">Execute</button>
        <button class="btn btn-secondary" onclick="clearResult()">Clear</button>
      </div>
      <div class="result-box" id="resultBox" style="display:none;margin-top:16px">
        <div class="result-header"><span>Result</span><span class="status" id="resultStatus">-</span></div>
        <pre id="resultContent"></pre>
      </div>
    </div>
  </div>
</div>
<script>
const PORT = {{port}};
let tools = [];
let currentTool = null;
let rawMode = false;

async function loadTools() {
  const r = await fetch('/mcp', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:'1',method:'tools/list'})
  });
  const d = await r.json();
  if(d.result&&d.result.tools) tools=d.result.tools;
  else tools=d.tools||[];
  renderTools();
  document.getElementById('statTools').textContent=tools.length;
  document.getElementById('toolCount').textContent='('+tools.length+')';
}

async function loadHealth() {
  try {
    const r=await fetch('/health');
    const d=await r.json();
    const st=d.status||'unknown';
    document.getElementById('statStatus').textContent=st;
    document.getElementById('statStatus').parentElement.style.borderColor=st==='ok'?'#238636':'#da3633';
  } catch{}
}

function renderTools() {
  const q=document.getElementById('search').value.toLowerCase();
  const el=document.getElementById('toolList');
  const filtered=tools.filter(t=>t.name.toLowerCase().includes(q));
  el.innerHTML=filtered.map(t=>{
    const params=t.inputSchema&&t.inputSchema.properties?Object.keys(t.inputSchema.properties).length:0;
    const req=t.inputSchema&&t.inputSchema.required?t.inputSchema.required.length:0;
    return '<div class="tool-item'+(currentTool&&currentTool.name===t.name?' active':'')+'" onclick="selectTool(\''+t.name+'\')"><span class="name">'+t.name+'</span><span class="badge">'+params+'p</span></div>';
  }).join('');
}

function filterTools(){renderTools()}

function selectTool(name) {
  currentTool=tools.find(t=>t.name===name);
  if(!currentTool)return;
  document.getElementById('welcome').style.display='none';
  document.getElementById('toolPanel').style.display='block';
  document.querySelectorAll('.tool-item').forEach(e=>e.classList.remove('active'));
  document.querySelector('.tool-item:has(.name:text("'+name+'"))')?.classList.add('active');
  renderTools();

  document.getElementById('toolName').textContent=name;
  document.getElementById('toolDesc').textContent=currentTool.description||'No description';

  const schema=currentTool.inputSchema||{};
  const props=schema.properties||{};
  const req=schema.required||[];
  const container=document.getElementById('paramList');
  const keys=Object.keys(props);
  if(keys.length===0) {
    container.innerHTML='<div style="color:#8b949e;font-size:13px;padding:8px 0">No parameters</div>';
  } else {
    container.innerHTML=keys.map(k=>{
      const p=props[k];
      const def=p.default!==undefined?JSON.stringify(p.default):'';
      const isReq=req.includes(k);
      const ph=p.enum?'['+p.enum.join(', ')+']':p.examples?JSON.stringify(p.examples[0]):def||'';
      return '<div class="param-row">'+
        '<span style="font-size:12px;min-width:100px;font-family:monospace;color:'+(isReq?'#f85149':'#8b949e')+'">'+
        k+(isReq?' *':'')+'</span>'+
        '<input id="param_'+k+'" placeholder="'+p.type+(ph?': '+ph:'')+'" value="'+(p.type==='boolean'?String(p.default||false):p.default!==undefined?JSON.stringify(p.default):'')+'">'+
        '</div>';
    }).join('');
  }
  document.getElementById('jsonInput').value='{}';
  document.getElementById('resultBox').style.display='none';
  rawMode=false;
  document.getElementById('jsonEditor').classList.remove('visible');
  document.getElementById('rawIcon').textContent='▶';
}

function collectParams() {
  if(rawMode) {
    try{return JSON.parse(document.getElementById('jsonInput').value)}catch{return {}}
  }
  const schema=currentTool.inputSchema||{};
  const props=schema.properties||{};
  const result={};
  for(const k of Object.keys(props)) {
    const el=document.getElementById('param_'+k);
    if(!el)continue;
    const v=el.value.trim();
    if(v==='')continue;
    const p=props[k];
    if(p.type==='number'||p.type==='integer') result[k]=Number(v);
    else if(p.type==='boolean') result[k]=v==='true'||v==='1';
    else if(p.type==='array') { try{result[k]=JSON.parse(v)}catch{result[k]=v.split(',').map(x=>x.trim())} }
    else if(p.type==='object') { try{result[k]=JSON.parse(v)}catch{result[k]=v} }
    else result[k]=v;
  }
  return result;
}

function toggleRawEditor() {
  rawMode=!rawMode;
  document.getElementById('jsonEditor').classList.toggle('visible');
  document.getElementById('rawIcon').textContent=rawMode?'▼':'▶';
  if(rawMode) {
    document.getElementById('jsonInput').value=JSON.stringify(collectParams(),null,2);
  }
}

async function executeTool() {
  if(!currentTool)return;
  const btn=document.getElementById('execBtn');
  btn.disabled=true;btn.textContent='Executing...';
  document.getElementById('resultBox').style.display='block';
  document.getElementById('resultStatus').textContent='RUNNING';
  document.getElementById('resultStatus').className='status pending';
  document.getElementById('resultContent').textContent='Waiting for result...';

  const args=collectParams();
  try {
    const r=await fetch('/mcp',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:Date.now().toString(),method:'tools/call',params:{name:currentTool.name,arguments:args}})
    });
    const d=await r.json();
    const content=d.result?.content||[];
    const isErr=d.result?.isError||d.error;
    const text=content.map(c=>c.text).join('\n');

    document.getElementById('resultStatus').textContent=isErr?'ERROR':'SUCCESS';
    document.getElementById('resultStatus').className='status '+(isErr?'error':'success');

    // Pretty-print JSON if parseable
    try {
      const parsed=JSON.parse(text);
      document.getElementById('resultContent').textContent=JSON.stringify(parsed,null,2);
    } catch {
      document.getElementById('resultContent').textContent=text;
    }
  } catch(e) {
    document.getElementById('resultStatus').textContent='ERROR';
    document.getElementById('resultStatus').className='status error';
    document.getElementById('resultContent').textContent='Request failed: '+e.message;
  }
  btn.disabled=false;btn.textContent='Execute';
}

function clearResult() {
  document.getElementById('resultBox').style.display='none';
}

loadTools();
loadHealth();
setInterval(loadHealth,5000);
</script>
</body>
</html>
