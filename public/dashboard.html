<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roblox MCP Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:16px;height:52px}
header h1{font-size:17px;color:#f0f6fc;font-weight:600}
header span{color:#8b949e;font-size:13px}
.layout{display:flex;height:calc(100vh - 52px)}
.sidebar{width:260px;min-width:260px;background:#161b22;border-right:1px solid #30363d;overflow-y:auto;padding:8px}
.sidebar h3{font-size:11px;text-transform:uppercase;color:#8b949e;margin:12px 0 6px;padding:0 8px;letter-spacing:.5px}
.search-box{margin-bottom:8px;padding:0 4px}
.search-box input{width:100%;padding:6px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;outline:none}
.search-box input:focus{border-color:#1f6feb}
.tool-item{padding:5px 8px;cursor:pointer;border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center;color:#c9d1d9}
.tool-item:hover{background:#1c2128}
.tool-item.active{background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44;padding:4px 7px}
.tool-item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tool-item .badge{font-size:9px;background:#30363d;padding:1px 5px;border-radius:8px;color:#8b949e;margin-left:5px}
.main{flex:1;padding:20px 24px;overflow-y:auto}
.tool-header h2{font-size:18px;color:#f0f6fc;margin-bottom:4px}
.tool-header p{font-size:12px;color:#8b949e;line-height:1.4;margin-bottom:12px}
.section{margin-bottom:14px}
.section label{font-size:11px;font-weight:600;color:#8b949e;margin-bottom:4px;text-transform:uppercase}
.section input,.section select,.section textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;font-family:monospace;outline:none}
.section input:focus,.section select:focus,.section textarea:focus{border-color:#1f6feb}
.section textarea{min-height:50px;resize:vertical}
.section select{cursor:pointer}
.btn-group{display:flex;gap:6px;margin-top:12px}
.btn{padding:7px 18px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.result-box{border-radius:8px;border:1px solid #30363d;overflow:hidden;margin-top:14px}
.result-box .header{padding:8px 12px;background:#161b22;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;color:#8b949e;display:flex;justify-content:space-between}
.result-box .header .status{padding:2px 7px;border-radius:8px;font-size:10px}
.result-box .header .status.ok{background:#23863633;color:#3fb950}
.result-box .header .status.err{background:#da363333;color:#f85149}
.result-box .header .status.pending{background:#d2992233;color:#d29922}
.result-box pre{padding:12px;overflow:auto;max-height:400px;font-size:11px;line-height:1.5;font-family:monospace;white-space:pre-wrap;word-break:break-all;margin:0}
.param-row{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.param-row input,.param-row select{flex:1;min-width:0}
.param-row select{width:auto}
.param-row>span{flex-shrink:0;min-width:90px;font-size:11px;font-family:monospace}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8b949e;text-align:center;gap:10px}
.welcome h2{color:#f0f6fc;font-size:22px}
.welcome p{font-size:13px;max-width:400px}
.stats{display:flex;gap:20px;margin-top:12px}
.stat{border:1px solid #30363d;border-radius:8px;padding:14px 22px;background:#161b22}
.stat .num{font-size:26px;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:11px;color:#8b949e;margin-top:2px}
.version{font-size:11px;color:#8b949e;background:#161b22;padding:2px 8px;border-radius:8px;border:1px solid #30363d}
</style>
</head>
<body>
<header>
  <h1>Roblox MCP</h1>
  <span class="version">v{{version}}</span>
  <span>localhost:{{port}}</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="search-box"><input id="search" type="text" placeholder="Search tools..." oninput="filterTools()"></div>
    <h3>Tools <span id="toolCount"></span></h3>
    <div id="toolList"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="welcome" id="welcome">
      <h2>MCP Playground</h2>
      <p>Select a tool from the sidebar to test it.</p>
      <div class="stats">
        <div class="stat"><div class="num" id="statTools">0</div><div class="lbl">Tools</div></div>
        <div class="stat"><div class="num" id="statStatus">-</div><div class="lbl">Status</div></div>
        <div class="stat"><div class="num">{{port}}</div><div class="lbl">Port</div></div>
      </div>
    </div>
    <div id="toolPanel" style="display:none">
      <div class="tool-header">
        <h2 id="toolName"></h2>
        <p id="toolDesc"></p>
      </div>
      <div class="section">
        <label>Parameters</label>
        <div id="paramList"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="executeTool()" id="execBtn">Execute</button>
        <button class="btn btn-secondary" onclick="clearResult()">Clear</button>
      </div>
      <div class="result-box" id="resultBox" style="display:none">
        <div class="header"><span>Result</span><span class="status" id="resultStatus">-</span></div>
        <pre id="resultContent"></pre>
      </div>
    </div>
  </div>
</div>
<script>
const PORT = {{port}};
let tools = [];
let currentTool = null;

async function loadTools() {
  const r=await fetch('/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:'1',method:'tools/list'})});
  const d=await r.json();
  tools = d.result?.tools || d.tools || [];
  renderTools();
  document.getElementById('statTools').textContent = tools.length;
  document.getElementById('toolCount').textContent = '('+tools.length+')';
}

async function loadHealth() {
  try {
    const r=await fetch('/health');
    const d=await r.json();
    const st=d.status||'unknown';
    document.getElementById('statStatus').textContent=st;
    document.getElementById('statStatus').parentElement.style.borderColor=st==='ok'?'#238636':'#da3633';
  } catch{}
}

function renderTools() {
  const q=document.getElementById('search').value.toLowerCase();
  const el=document.getElementById('toolList');
  const filtered=tools.filter(t=>t.name.toLowerCase().includes(q));
  el.innerHTML=filtered.map(t => {
    const sp=(t.inputSchema&&t.inputSchema.properties)?Object.keys(t.inputSchema.properties).length:0;
    return '<div class="tool-item" data-tool="'+esc(t.name)+'" onclick="selectTool(\''+esc(t.name).replace(/'/g,"\\'")+'\')"><span class="name">'+esc(t.name)+'</span><span class="badge">'+sp+'p</span></div>';
  }).join('');
  if(currentTool) {
    const a=el.querySelector('[data-tool="'+esc(currentTool.name)+'"]');
    if(a)a.classList.add('active');
  }
}

function filterTools(){renderTools()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function selectTool(name) {
  currentTool=tools.find(t=>t.name===name);
  if(!currentTool) return;
  document.getElementById('welcome').style.display='none';
  document.getElementById('toolPanel').style.display='block';
  document.querySelectorAll('.tool-item').forEach(e=>e.classList.remove('active'));
  const a=document.querySelector('[data-tool="'+esc(name)+'"]');
  if(a)a.classList.add('active');
  document.getElementById('toolName').textContent=name;
  document.getElementById('toolDesc').textContent=currentTool.description||'No description';
  const schema=currentTool.inputSchema||{};
  const props=schema.properties||{};
  const req=schema.required||[];
  const container=document.getElementById('paramList');
  const keys=Object.keys(props);
  if(keys.length===0) {
    container.innerHTML='<div style="color:#8b949e;font-size:12px;padding:6px 0">No parameters</div>';
  } else {
    container.innerHTML=keys.map(k=>{
      const p=props[k];
      const def=p.default;
      const defStr=def!==undefined?String(def):'';
      const isReq=req.includes(k);
      let inp;
      if(p.enum) {
        inp='<select id="prm_'+k+'" style="flex:1;padding:5px 8px;border-radius:5px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;outline:none;font-family:monospace">'+
          p.enum.map(e=>'<option value="'+e+'"'+(def===e?' selected':'')+'>'+e+'</option>').join('')+'</select>';
      } else if(p.type==='boolean') {
        inp='<select id="prm_'+k+'" style="flex:1;padding:5px 8px;border-radius:5px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;outline:none;font-family:monospace">'+
          '<option value="true"'+(def===true?' selected':'')+'>true</option>'+
          '<option value="false"'+(def===false?' selected':'')+'>false</option>'+'</select>';
      } else if(p.type==='array'||p.type==='object') {
        const ph=p.examples?JSON.stringify(p.examples[0]):(p.type==='array'?'["item1"]':'{"key":"val"}');
        inp='<input id="prm_'+k+'" placeholder="'+esc(ph)+'" value="'+(p.type==='array'?'[]':'{}')+'">';
      } else {
        const ph=p.examples?JSON.stringify(p.examples[0]):p.default!==undefined?JSON.stringify(p.default):'';
        inp='<input id="prm_'+k+'" placeholder="'+esc(ph||p.type||'')+'" value="'+defStr+'">';
      }
      return '<div class="param-row">'+
        '<span style="color:'+(isReq?'#f85149':'#8b949e')+'">'+esc(k)+(isReq?' <span style="color:#f85149">*</span>':'')+'</span>'+
        inp+'</div>';
    }).join('');
  }
  document.getElementById('resultBox').style.display='none';
}

function collectParams() {
  const schema=currentTool.inputSchema||{};
  const props=schema.properties||{};
  const result={};
  for(const k of Object.keys(props)) {
    const el=document.getElementById('prm_'+k);
    if(!el) continue;
    const v=el.value.trim();
    if(v==='') continue;
    const p=props[k];
    if(p.type==='number'||p.type==='integer') result[k]=Number(v);
    else if(p.type==='boolean') result[k]=v==='true';
    else if(p.type==='array') { try{result[k]=JSON.parse(v)}catch{result[k]=v.split(',').map(x=>x.trim())} }
    else if(p.type==='object') { try{result[k]=JSON.parse(v)}catch{result[k]=v} }
    else result[k]=v;
  }
  return result;
}

async function executeTool() {
  if(!currentTool)return;
  const btn=document.getElementById('execBtn');
  btn.disabled=true;btn.textContent='Executing...';
  document.getElementById('resultBox').style.display='block';
  document.getElementById('resultStatus').textContent='Running...';
  document.getElementById('resultStatus').className='status pending';
  document.getElementById('resultContent').textContent='Waiting...';
  const args=collectParams();
  try {
    const r=await fetch('/mcp',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:Date.now().toString(),method:'tools/call',params:{name:currentTool.name,arguments:args}})
    });
    const d=await r.json();
    const content=(d.result?.content||[]).map(c=>c.text).join('\n');
    const isErr=d.result?.isError||d.error;
    document.getElementById('resultStatus').textContent=isErr?'ERROR':'SUCCESS';
    document.getElementById('resultStatus').className='status '+(isErr?'err':'ok');
    try {
      const parsed=JSON.parse(content);
      document.getElementById('resultContent').textContent=JSON.stringify(parsed,null,2);
    } catch {
      document.getElementById('resultContent').textContent=content||JSON.stringify(d,null,2);
    }
  } catch(e) {
    document.getElementById('resultStatus').textContent='ERROR';
    document.getElementById('resultStatus').className='status err';
    document.getElementById('resultContent').textContent='Request failed: '+e.message;
  }
  btn.disabled=false;btn.textContent='Execute';
}

function clearResult() {
  document.getElementById('resultBox').style.display='none';
}

loadTools();
loadHealth();
setInterval(loadHealth,5000);
</script>
</body>
</html>
