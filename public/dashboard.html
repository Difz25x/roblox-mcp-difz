<!DOCTYPE html>
<html>
<head>
    <title>Roblox MCP Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f111a; color: #fff; margin: 0; padding: 2rem; }
        .card { background: #1a1d27; border: 1px solid #2e3246; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        h1 { margin-top: 0; color: #00e6e6; }
        .process-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .process-item { display: flex; justify-content: space-between; align-items: center; background: #222634; padding: 1rem; border-radius: 6px; }
        button { background: #00e6e6; color: #000; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button.kill { background: #ff4444; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Roblox MCP Server</h1>
        <p>Version: {{version}} | Port: {{port}}</p>
    </div>

    <div class="card">
        <h2>Active Processes</h2>
        <div id="processes" class="process-list">Loading...</div>
    </div>

    <script>
        async function loadProcesses() {
            try {
                const res = await fetch('/api/processes');
                const data = await res.json();
                const container = document.getElementById('processes');
                
                if (!data.processes || data.processes.length === 0) {
                    container.innerHTML = '<p>No Roblox processes found.</p>';
                    return;
                }

                container.innerHTML = data.processes.map(p => `
                    <div class="process-item">
                        <div>
                            <strong>${p.windowTitle || p.name}</strong><br>
                            <small>PID: ${p.pid} | Memory: ${p.memoryMB} MB</small>
                        </div>
                        <div>
                            <button onclick="restart(${p.pid})">Restart</button>
                            <button class="kill" onclick="kill(${p.pid})">Kill</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('processes').innerHTML = '<p style="color:red">Failed to load processes</p>';
            }
        }

        async function kill(pid) {
            await fetch(`/api/processes/${pid}/kill`, { method: 'POST' });
            loadProcesses();
        }

        async function restart(pid) {
            await fetch(`/api/processes/${pid}/restart`, { method: 'POST' });
            loadProcesses();
        }

        loadProcesses();
        setInterval(loadProcesses, 5000);
    </script>
</body>
</html>
